<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nhomtuay Tracking System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;700;900&display=swap');
    
    html, body { 
      font-family: 'Mitr', sans-serif; 
      margin: 0; 
      padding: 0;
      height: 100%;
      overflow: hidden; 
    }
    
    .bg-striped { 
      background-color: #ffffff; 
      background-image: linear-gradient(-45deg, #fff9fb 25%, transparent 25%, transparent 50%, #fff9fb 50%, #fff9fb 75%, transparent 75%, transparent); 
      background-size: 40px 40px; 
      animation: stripeSlide 2s linear infinite; 
    }
    
    @keyframes stripeSlide { 
      0% { background-position: 0 0; } 
      100% { background-position: 40px 40px; } 
    }
    
    @keyframes twinkle { 
      0%, 100% { opacity: 1; transform: scale(1); } 
      50% { opacity: 0.2; transform: scale(0.8); } 
    }
    .animate-twinkle { animation: twinkle 4s ease-in-out infinite; }
    
    .lace-mask {
      position: relative;
      background-color: #ffffff; 
      border-radius: 12px;
    }
    .lace-mask::before {
      content: "";
      position: absolute;
      top: -10px; 
      bottom: -10px; 
      left: -10px; 
      right: -10px;
      background-image: 
        radial-gradient(circle, #ffffff 10px, transparent 10.5px),
        radial-gradient(circle, #ffffff 10px, transparent 10.5px),
        radial-gradient(circle, #ffffff 10px, transparent 10.5px),
        radial-gradient(circle, #ffffff 10px, transparent 10.5px);
      background-size: 20px 20px;
      background-position: top 0 left 0, bottom 0 left 0, top 0 left 0, top 0 right 0;
      background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
      z-index: -1; 
    }

    .marquee-wrapper { width: 100%; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
    .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 18s linear infinite; will-change: transform; }
    @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    
    .admin-input { 
      width: 100%; 
      background-color: rgba(255, 255, 255, 0.7); 
      border: 1px solid #fff5f9; 
      border-radius: 1.5rem; 
      padding: 0.8rem 1.2rem; 
      font-size: 0.85rem; 
      outline: none; 
      color: #7A6B72; 
      transition: all 0.3s; 
    }
    .admin-input:focus { border-color: #FFB7D5; background-color: white; }
    .admin-input::placeholder { color: #FFD1DC; font-weight: 500; }
    .custom-scrollbar::-webkit-scrollbar { width: 0px; }
  </style>
</head>
<body>
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { 
      Search, PlusCircle, List, User, Home, ExternalLink, Sparkles, Calendar, Clock, 
      ChevronRight, Megaphone, Star, ShoppingBag, PlaneLanding, Truck, Gift, 
      ChevronDown, MousePointer2, Warehouse, PackageCheck, CheckCircle2, Settings, 
      Lock, MessageSquare, LogOut, Info, Save, MapPin, Loader2, Camera
    } from 'https://esm.sh/lucide-react?deps=react@18,react-dom@18';

    const API_URL = "https://script.google.com/macros/s/AKfycbxMgBhl8eZAtSjU3TMeRf35nqMnyQUTEBlsD4QEpJ97kESY3OVTTV16wmfzO9iHSW7Jqw/exec"; 

    const MyCustomStar = ({ className, size = 24, color = "#FFB7D5", opacity = 1 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={color} style={{ opacity }} className={`animate-twinkle ${className}`} xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" />
      </svg>
    );

    const App = () => {
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('customer'); 
      const [isAdmin, setIsAdmin] = useState(false);
      const [selectedOrder, setSelectedOrder] = useState(null); 
      const [announcement, setAnnouncement] = useState('กำลังโหลดข้อมูล... ✨');
      const [searchInstruction, setSearchInstruction] = useState('กำลังโหลดข้อมูล... 🐾');
      const [bgUrl, setBgUrl] = useState(''); 
      const [adminPassword, setAdminPassword] = useState('');
      const [tempPassword, setTempPassword] = useState('');
      const [orders, setOrders] = useState([]);
      const [customerSearch, setCustomerSearch] = useState('');
      const [adminSearch, setAdminSearch] = useState('');
      const [foundOrders, setFoundOrders] = useState([]);
      const [hasSearched, setHasSearched] = useState(false); 
      const [loginInput, setLoginInput] = useState('');
      const [platformList, setPlatformList] = useState(['FACEBOOK', 'IG', 'X', 'TIKTOK', 'LINE', 'SHOPEE', 'LAZADA']);
      
      const initialOrderState = {
        id: '', accountName: '', recipientName: '', orderDetail: '', address: '',
        status: 'รับออเดอร์', arrivalTH: '', deliveryTH: '', tracking: '', platform: ''
      };
      const [newOrder, setNewOrder] = useState(initialOrderState);

      const statusSteps = [
        { label: 'รับออเดอร์', icon: ShoppingBag, color: '#D8BFD8' }, 
        { label: 'หิ้วแล้ว', icon: PackageCheck, color: '#FFB7D5' },   
        { label: 'กดเว็บแล้ว', icon: MousePointer2, color: '#FDE047' },     
        { label: 'คลังญี่ปุ่นรับสินค้า', icon: Warehouse, color: '#98FB98' },
        { label: 'ของถึงโกดังไทย', icon: Home, color: '#BAE6FD' },
        { label: 'ชิปปิ้งจัดส่ง', icon: PlaneLanding, color: '#DDD6FE' },
        { label: 'ทางร้านจัดส่ง', icon: Truck, color: '#FBCFE8' }
      ];

      const getStatusColor = (status) => statusSteps.find(s => s.label === status)?.color || '#FFB7D5';

      useEffect(() => {
        fetch(API_URL)
          .then(res => res.json())
          .then(data => {
            if (data.success) {
              setOrders(data.orders || []);
              if (data.settings) {
                setAnnouncement(data.settings.announcement || '');
                setSearchInstruction(data.settings.searchInstruction || '');
                setBgUrl(data.settings.bgUrl || '');
                setAdminPassword(data.settings.adminPassword || '1234');
              }
              if (data.platforms) setPlatformList(prev => [...new Set([...prev, ...data.platforms])]);
            }
            setIsLoading(false);
          })
          .catch(err => { console.error("Fetch error:", err); setIsLoading(false); });
      }, []);

      const sendPostRequest = async (action, data) => {
        try {
          await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data })
          });
        } catch (error) { console.error("API Error:", error); }
      };

      const handleSaveOrder = async (e) => {
        e.preventDefault();
        const action = view === 'admin-edit' ? 'editOrder' : 'addOrder';
        const orderData = { ...newOrder };
        if (action === 'addOrder' && !orderData.dateAdded) orderData.dateAdded = new Date().toISOString().split('T')[0];
        if (action === 'editOrder') setOrders(orders.map(o => o.id === orderData.id ? orderData : o));
        else setOrders([...orders, orderData]);
        setNewOrder(initialOrderState); setView('admin-list');
        await sendPostRequest(action, orderData);
      };

      const handleQuickStatusUpdate = async (id, newStatus) => {
        setOrders(orders.map(o => o.id === id ? { ...o, status: newStatus } : o));
        await sendPostRequest('updateStatus', { id, status: newStatus });
      };

      const handleDeleteOrder = async (id) => {
        if(window.confirm('คุณต้องการลบออเดอร์นี้ใช่หรือไม่?')) {
          setOrders(orders.filter(o => o.id !== id)); setView('admin-list');
          await sendPostRequest('deleteOrder', { id });
        }
      };

      const handleUpdateSettings = async (type) => {
        if (type === 'announcement') await sendPostRequest('updateSettings', { announcement });
        else if (type === 'searchGuide') await sendPostRequest('updateSettings', { searchInstruction });
        else if (type === 'background') await sendPostRequest('updateSettings', { bgUrl });
        else if (type === 'password') {
          if (tempPassword.length < 4) { alert('รหัสผ่านควรมีอย่างน้อย 4 ตัวอักษร'); return; }
          setAdminPassword(tempPassword); await sendPostRequest('updateSettings', { adminPassword: tempPassword });
          setTempPassword(''); alert('เปลี่ยนรหัสผ่านเรียบร้อยแล้ว');
        }
      };

      const handleCustomerSearch = () => {
        if (!customerSearch.trim()) { setHasSearched(false); setFoundOrders([]); return; }
        const results = orders.filter(order => order.accountName.toLowerCase().includes(customerSearch.trim().toLowerCase()));
        setFoundOrders(results); setHasSearched(true);
      };

      const handleAdminLogin = () => {
        if (loginInput === adminPassword) { setIsAdmin(true); setView('admin-list'); setLoginInput(''); }
        else alert('รหัสผ่านไม่ถูกต้อง');
      };

      const handleOpenDetail = (order) => { setSelectedOrder(order); setView('admin-detail'); };

      const OrderStepper = ({ currentStatus }) => {
        const currentIndex = statusSteps.findIndex(s => s.label === currentStatus);
        return (
          <div className="flex flex-col gap-0 px-2 py-2">
            {statusSteps.map((step, index) => {
              const isReached = index <= currentIndex;
              const isCurrent = index === currentIndex;
              const Icon = step.icon;
              return (
                <div key={step.label} className="flex gap-4 relative">
                  {index !== statusSteps.length - 1 && (
                    <div className={`absolute left-[13.5px] top-[28px] w-[2px] h-[calc(100%-24px)] border-l-2 border-dashed ${isReached && index < currentIndex ? 'border-pink-300' : 'border-gray-100'}`}></div>
                  )}
                  <div className="flex flex-col items-center z-10">
                    <div 
                      className={`w-[28px] h-[28px] rounded-full flex items-center justify-center transition-all duration-500 border-2 ${isReached ? 'border-white shadow-sm' : 'bg-white border-gray-50 text-gray-200'} ${isCurrent ? 'scale-125 ring-4 ring-pink-100/50' : 'scale-100'}`}
                      style={{ backgroundColor: isReached && !isCurrent ? step.color : 'white' }}
                    >
                      {isCurrent ? (
                        <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3YmdwdzBjbml0N3h1eWlqemQxMTdhN2xtanIxMzU0Mnk2cGEwaXRiayZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/0rrazFIa81ovX1ykyZ/giphy.gif" alt="Active" className="w-6 h-6 object-contain" />
                      ) : isReached && index < currentIndex ? (
                        <CheckCircle2 size={14} className="text-white" />
                      ) : (
                        <Icon size={14} className={isReached ? 'text-white' : 'text-gray-200'} />
                      )}
                    </div>
                  </div>
                  <div className={`flex items-center pb-6 ${isCurrent ? 'translate-x-1' : ''}`}>
                    <span className={`text-[11px] font-black tracking-tight ${isCurrent ? 'text-pink-500' : isReached ? 'text-[#7A6B72]' : 'text-gray-300'}`}>
                      {step.label} {isCurrent && <span className="ml-2 inline-block animate-bounce">✨</span>}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="min-h-[100dvh] bg-striped font-sans text-[#7A6B72] flex items-center justify-center overflow-hidden p-3 sm:p-6">
          <div 
            className="w-full max-w-[420px] h-[calc(100dvh-24px)] sm:h-[850px] drop-shadow-[0_15px_35px_rgba(255,183,213,0.35)] relative flex flex-col lace-mask"
            style={bgUrl ? { backgroundImage: `url(${bgUrl})`, backgroundSize: 'cover', backgroundPosition: 'center' } : {}}
          >
            <div className="absolute inset-0 backdrop-blur-[6px] bg-white/20 pointer-events-none z-0 rounded-[12px]" style={{ maskImage: 'radial-gradient(circle at center, transparent 35%, black 85%)', WebkitMaskImage: 'radial-gradient(circle at center, transparent 35%, black 85%)' }}></div>

            <div className="relative z-10 flex flex-col h-full w-full">
              <header className="shrink-0 px-5 sm:px-7 pt-8 sm:pt-10 pb-4 relative">
                <MyCustomStar className="absolute top-6 left-3" size={16} color="#FFB7D5" />
                <div className="bg-white/80 rounded-[2rem] py-3.5 px-5 flex justify-between items-center shadow-sm border border-white/80 backdrop-blur-md relative overflow-hidden">
                  <div className="flex flex-col">
                    <div className="flex items-center gap-1">
                      <h1 className="text-lg font-black tracking-widest text-[#FFB7D5] uppercase">nhomtuay</h1>
                      {/* ขยาย GIF ดาวให้ใหญ่จุใจตามสั่ง */}
                      <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3aXgxdncxOGR6bzhrbGRrbmVlbWVtemZtNTN3MXg3MndpbnpjYWM0ZiZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/3LWy5senb4QFCIqgYd/giphy.gif" alt="Sparkles" className="w-12 h-12 object-contain -ml-2 -mt-1" />
                    </div>
                    <p className="text-[9px] font-bold text-[#D8BFD8] tracking-[0.2em] uppercase mt-[-10px]">ระบบติดตามสินค้า</p>
                  </div>
                  <div className="w-10 h-10 rounded-full bg-white border-2 border-pink-100 shadow-inner flex items-center justify-center overflow-hidden shrink-0">
                    {/* ใส่ลิงก์รูปโปรไฟล์ของคุณได้เลย */}
                    <img src="https://i.ibb.co/3mG26Y8h/649334019-3501023216721554-4674372379976090810-n.jpg" alt="Profile" className="w-full h-full object-cover" />
                  </div>
                </div>
              </header>

              {/* แถบ News คลีน ๆ ไม่มี GIF แล้วค่ะ */}
              <div className="mx-5 sm:mx-7 mb-4 z-20">
                <div className="shrink-0 h-[40px] bg-white rounded-2xl flex items-center px-2 overflow-hidden shadow-sm border border-white/80 w-full">
                  <div className="flex items-center gap-1.5 bg-[#FFB7D5] text-white px-2.5 py-1 rounded-xl shrink-0 border border-white/50 shadow-sm z-20 relative">
                    <Megaphone size={10} fill="white" />
                    <span className="text-[9px] font-black uppercase tracking-widest">News</span>
                  </div>
                  <div className="marquee-wrapper flex-1 ml-2">
                     <div className="marquee-content text-[#A78BFA] text-[11px] font-bold">{announcement}</div>
                  </div>
                </div>
              </div>

              <main className="flex-1 overflow-y-auto px-5 sm:px-7 pb-28 custom-scrollbar relative z-20">
                {isLoading ? (
                  <div className="flex flex-col items-center justify-center h-full pb-10">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3R5anNmajVzbnVxY2hwMnFvdmduNTN0YmM1ZGdicDV0MmtodGs1cSZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/EGNi09y1CXeyA/giphy.gif" alt="Loading" className="w-20 h-20 object-contain" />
                    <p className="text-[10px] font-black text-pink-400 uppercase tracking-widest">Loading data...</p>
                  </div>
                ) : (
                  <>
                    {view === 'customer' && (
                      <div className="space-y-5 animate-in fade-in duration-500">
                        <div className="bg-white/90 rounded-[2rem] p-2 border border-white shadow-sm backdrop-blur-md">
                           <div className="flex items-center gap-3 px-3">
                              <input type="text" placeholder="พิมพ์ชื่อแอคเคาท์ของคุณ..." className="flex-1 bg-transparent outline-none text-[13px] placeholder-pink-200 font-medium py-1.5 w-full" value={customerSearch} onChange={(e) => { setCustomerSearch(e.target.value); setHasSearched(false); setFoundOrders([]); }} onKeyPress={(e) => e.key === 'Enter' && handleCustomerSearch()} />
                              <button onClick={handleCustomerSearch} className="bg-pink-400 text-white p-2 rounded-[1rem] active:scale-95 shadow-md shadow-pink-200"><Search size={14} /></button>
                           </div>
                        </div>
                        {!customerSearch && (
                          <div className="text-center animate-in zoom-in-95 duration-500">
                             <div className="bg-white/80 backdrop-blur-md border border-white px-4 py-3 rounded-2xl shadow-sm text-left relative overflow-hidden">
                               <p className="text-[11px] text-[#7A6B72] font-medium whitespace-pre-line leading-relaxed"><span className="font-black text-pink-400 text-[12px]">💡 วิธีการค้นหา:</span><br/>{searchInstruction}</p>
                             </div>
                          </div>
                        )}
                        {customerSearch && !hasSearched && (
                          <div className="text-center py-12 bg-white/80 rounded-[2.5rem] shadow-sm animate-in zoom-in-95">
                             <div className="w-12 h-12 bg-blue-50 text-blue-300 rounded-full flex items-center justify-center mx-auto mb-3 shadow-inner border border-white"><Search size={20} className="animate-pulse" /></div>
                             <p className="text-[12px] font-black text-blue-400">กดปุ่มค้นหาเพื่อดูออเดอร์ได้เลยค่ะ 🔍</p>
                          </div>
                        )}
                        {customerSearch && hasSearched && (
                          <div className="space-y-5 mt-4">
                            {foundOrders.length > 0 ? foundOrders.map((order, idx) => (
                                <div key={idx} className="bg-white/95 rounded-[2rem] p-5 border border-white shadow-lg shadow-pink-100/50 flex flex-col gap-4 relative overflow-hidden animate-in slide-in-from-bottom-4">
                                  <div className="absolute top-0 right-6 bg-gradient-to-r from-pink-50 to-purple-50 text-pink-400 text-[8px] font-black px-3 py-1 rounded-b-lg border border-white shadow-sm">ORDER #{order.id}</div>
                                  <div className="flex-1 mt-2">
                                    <div className="flex justify-between items-start mb-2">
                                      <div><h4 className="font-black text-[#7A6B72] text-[15px] mb-1">{order.accountName}</h4><span className="text-[8px] bg-purple-50 text-purple-400 px-2.5 py-0.5 rounded font-black border border-white uppercase">{order.platform}</span></div>
                                      <div className="text-[8px] px-2.5 py-1 rounded-full border border-white shadow-sm flex items-center gap-1 font-bold bg-blue-50 text-blue-400"><Clock size={8} /> {order.status}</div>
                                    </div>
                                    <div className="bg-gray-50/70 p-3 rounded-xl border border-dashed border-pink-100 space-y-1.5">
                                      <p className="text-[10px] text-[#7A6B72] font-bold">ผู้รับ: {order.recipientName || '-'}</p>
                                      <p className="text-[10px] text-[#7A6B72] font-medium leading-relaxed">{order.orderDetail}</p>
                                      <div className="pt-1.5 border-t border-pink-50 flex gap-2"><MapPin size={10} className="text-pink-300" /><p className="text-[9px] italic">{order.address || 'ไม่ระบุที่อยู่'}</p></div>
                                    </div>
                                  </div>
                                  <div className="bg-white/70 rounded-2xl p-2.5 pb-6 border border-white shadow-sm overflow-hidden relative">
                                     <div className="text-[9px] font-black text-pink-300 uppercase tracking-[0.2em] mb-3 flex items-center gap-1.5"><Sparkles size={10} className="text-yellow-400" /> Tracking Progress</div>
                                     <OrderStepper currentStatus={order.status} />
                                  </div>
                                  <div className="flex flex-col gap-2 pt-2 border-t border-dashed border-gray-100">
                                    <div className="flex justify-between items-center px-1">
                                        <div className="flex items-center gap-1.5"><Calendar size={11} className="text-pink-300" /><p className="text-[9px] font-black">ถึงไทย: {order.arrivalTH || '-'}</p></div>
                                        <div className="flex items-center gap-1.5"><Truck size={11} className="text-pink-300" /><p className="text-[9px] font-black">ส่งไทย: {order.deliveryTH || '-'}</p></div>
                                    </div>
                                    <div className="flex justify-between items-center bg-purple-50/50 p-2 rounded-lg border border-white shadow-sm">
                                       <div className="flex items-center gap-2"><PackageCheck size={12} className="text-purple-400" /><div><p className="text-[8px] text-purple-300 font-bold leading-none mb-0.5 uppercase">Track No.</p>{order.tracking ? <a href={`https://track.thailandpost.co.th/?trackNumber=${order.tracking}`} target="_blank" className="text-[11px] font-black text-purple-500 hover:underline">{order.tracking}</a> : <p className="text-[11px] font-black text-purple-500">Wait</p>}</div></div>
                                       <button onClick={() => order.tracking && window.open(`https://track.thailandpost.co.th/?trackNumber=${order.tracking}`)} className={`p-1.5 rounded-md border shadow-sm ${order.tracking ? 'bg-white text-purple-500 border-purple-100' : 'bg-gray-50 text-gray-300'}`}><ExternalLink size={10} /></button>
                                    </div>
                                  </div>
                                </div>
                              )) : (
                              <div className="text-center py-12 bg-white/80 rounded-[2.5rem] shadow-sm">
                                 <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3R5anNmajVzbnVxY2hwMnFvdmduNTN0YmM1ZGdicDV0MmtodGs1cSZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/kDwgqm3RQBPAX0Chny/giphy.gif" alt="Not Found" className="w-20 h-20 mx-auto mb-2" />
                                 <p className="text-[11px] font-black text-pink-400 italic">ไม่พบข้อมูลออเดอร์นะคะ 😿</p>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                    {view === 'login' && (
                      <div className="bg-white/95 p-7 rounded-[2.5rem] text-center shadow-lg mt-8 animate-in fade-in zoom-in-95">
                        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3R5anNmajVzbnVxY2hwMnFvdmduNTN0YmM1ZGdicDV0MmtodGs1cSZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/JqK1kph1aSkCEuvAeN/giphy.gif" alt="Admin" className="w-24 h-24 mx-auto mb-2" />
                        <h2 className="text-base font-black text-pink-400 mb-6 uppercase tracking-[0.2em]">Admin Login</h2>
                        <input type="password" placeholder="Password" className="admin-input w-full text-center py-3 mb-5 font-bold shadow-inner" value={loginInput} onChange={(e) => setLoginInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAdminLogin()} />
                        <button onClick={handleAdminLogin} className="w-full bg-pink-400 text-white font-black py-3.5 rounded-2xl active:scale-95 shadow-md shadow-pink-200 tracking-widest text-[13px]">LOGIN</button>
                      </div>
                    )}
                    {(view === 'admin-add' || view === 'admin-edit') && (
                      <div className="bg-white/95 p-6 rounded-[2rem] border border-white shadow-lg space-y-5">
                        <h2 className="text-base font-black text-pink-400 flex items-center gap-2"><PlusCircle size={18} /> {view === 'admin-edit' ? 'แก้ไขรายการ' : 'เพิ่มรายการ'}</h2>
                        <form onSubmit={handleSaveOrder} className="space-y-3">
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">เลขออเดอร์</label><input required className="admin-input py-2 px-3 text-[12px]" placeholder="เช่น Q75" value={newOrder.id} onChange={e => setNewOrder({...newOrder, id: e.target.value})} disabled={view === 'admin-edit'} /></div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">ชื่อแอคเคาท์</label><input required className="admin-input py-2 px-3 text-[12px]" placeholder="เช่น คุณ Alice" value={newOrder.accountName} onChange={e => setNewOrder({...newOrder, accountName: e.target.value})} /></div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">ช่องทางการขาย</label><div className="relative"><input className="admin-input py-2 px-3 text-[12px]" list="platform-list" placeholder="เลือกหรือพิมพ์ช่องทาง..." value={newOrder.platform} onChange={e => setNewOrder({...newOrder, platform: e.target.value})} /><datalist id="platform-list">{platformList.map((p, i) => <option key={i} value={p} />)}</datalist><ChevronDown size={12} className="absolute right-3 top-1/2 -translate-y-1/2 text-pink-300 pointer-events-none" /></div></div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">รายละเอียดออเดอร์</label><textarea required className="admin-input h-16 py-2 px-3 text-[12px]" placeholder="ระบุรายการสินค้า..." value={newOrder.orderDetail} onChange={e => setNewOrder({...newOrder, orderDetail: e.target.value})} /></div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">ชื่อผู้รับ</label><input required className="admin-input py-2 px-3 text-[12px]" value={newOrder.recipientName} onChange={e => setNewOrder({...newOrder, recipientName: e.target.value})} /></div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">ที่อยู่จัดส่ง</label><textarea className="admin-input h-16 py-2 px-3 text-[12px]" value={newOrder.address} onChange={e => setNewOrder({...newOrder, address: e.target.value})} /></div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">สถานะ</label><div className="relative"><select className="admin-input py-2 px-3 text-[12px] appearance-none" value={newOrder.status} onChange={e => setNewOrder({...newOrder, status: e.target.value})}>{statusSteps.map(s => <option key={s.label} value={s.label}>{s.label}</option>)}</select><ChevronDown size={12} className="absolute right-3 top-1/2 -translate-y-1/2 text-pink-300 pointer-events-none" /></div></div>
                          <div className="grid grid-cols-2 gap-3">
                            <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">รอบถึงไทย</label><input className="admin-input py-2 px-3 text-[12px]" value={newOrder.arrivalTH} onChange={e => setNewOrder({...newOrder, arrivalTH: e.target.value})} /></div>
                            <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">ส่งไทย</label><input className="admin-input py-2 px-3 text-[12px]" value={newOrder.deliveryTH} onChange={e => setNewOrder({...newOrder, deliveryTH: e.target.value})} /></div>
                          </div>
                          <div><label className="text-[9px] font-black text-pink-300 ml-2 uppercase">Tracking No.</label><input className="admin-input py-2 px-3 text-[12px]" value={newOrder.tracking} onChange={e => setNewOrder({...newOrder, tracking: e.target.value})} /></div>
                          <button type="submit" className="w-full bg-pink-400 text-white font-black py-3 rounded-2xl shadow-md active:scale-95 transition-all text-[12px] uppercase">{view === 'admin-edit' ? 'Update' : 'Save'}</button>
                        </form>
                      </div>
                    )}
                    {view === 'admin-list' && (
                      <div className="space-y-3 animate-in fade-in duration-300">
                         <div className="bg-white/90 p-2.5 rounded-[1.5rem] border border-white flex items-center gap-2 shadow-sm backdrop-blur-md">
                           <Search size={14} className="text-pink-300" /><input className="flex-1 outline-none text-[12px] font-bold bg-transparent" placeholder="Search orders..." value={adminSearch} onChange={(e) => setAdminSearch(e.target.value)} />
                         </div>
                         <div className="space-y-2 pb-2">{orders.filter(o => o.accountName.toLowerCase().includes(adminSearch.toLowerCase())).map((order, idx) => (
                            <div key={idx} onClick={() => handleOpenDetail(order)} className="bg-white/95 p-3 rounded-[1.2rem] flex items-center justify-between shadow-sm active:scale-[0.98] cursor-pointer">
                               <div className="flex items-center gap-2.5 flex-1 overflow-hidden">
                                 <div className="w-1.5 h-8 rounded-full shrink-0" style={{ backgroundColor: getStatusColor(order.status) }}></div>
                                 <div className="flex flex-col"><p className="text-[9px] font-black text-pink-500 uppercase">#{order.id}</p><p className="font-bold text-[12px] truncate">{order.accountName}</p></div>
                               </div>
                               <ChevronRight size={14} className="text-gray-200" />
                            </div>
                         ))}</div>
                      </div>
                    )}
                    {view === 'admin-detail' && selectedOrder && (
                      <div className="bg-white/95 p-5 rounded-[2rem] border border-white shadow-lg space-y-4 animate-in fade-in zoom-in-95">
                         <button onClick={() => setView('admin-list')} className="text-pink-400 flex items-center gap-0.5 text-[10px] font-black bg-pink-50 px-2.5 py-1 rounded-full border border-pink-100"><ChevronRight className="rotate-180" size={12} /> Back</button>
                         <div className="bg-white rounded-[1.5rem] p-4 border border-pink-50 shadow-inner space-y-3">
                            <div><p className="text-[8px] text-pink-300 font-bold uppercase">Order ID</p><p className="font-black text-base text-pink-500">#{selectedOrder.id}</p></div>
                            <div><p className="text-[8px] text-pink-300 font-bold uppercase">Account / Recipient</p><p className="font-bold text-[#7A6B72] text-[13px] flex flex-col"><span>{selectedOrder.accountName}</span><span className="text-pink-400 text-[10px] font-black">Recipient: {selectedOrder.recipientName || '-'}</span></p></div>
                            <div><p className="text-[8px] text-pink-300 font-bold uppercase">Details</p><div className="bg-gray-50 p-2.5 rounded-lg text-[10px]">{selectedOrder.orderDetail}</div></div>
                            <div className="grid grid-cols-2 gap-3"><div><p className="text-[8px] text-pink-300 font-bold uppercase">Arrival TH</p><p className="font-black text-[11px]">{selectedOrder.arrivalTH || '-'}</p></div><div><p className="text-[8px] text-pink-300 font-bold uppercase">Delivery TH</p><p className="font-black text-[11px]">{selectedOrder.deliveryTH || '-'}</p></div></div>
                         </div>
                         <div className="grid grid-cols-2 gap-2"><button onClick={() => { setNewOrder(selectedOrder); setView('admin-edit'); }} className="bg-yellow-400 text-white py-2.5 rounded-xl font-black text-[11px] uppercase">Edit</button><button onClick={() => handleDeleteOrder(selectedOrder.id)} className="bg-red-400 text-white py-2.5 rounded-xl font-black text-[11px] uppercase">Delete</button></div>
                      </div>
                    )}
                    {view === 'admin-settings' && (
                       <div className="bg-white/95 p-6 rounded-[2rem] border border-white shadow-lg space-y-6 animate-in fade-in zoom-in-95">
                          <h2 className="text-base font-black text-pink-400 flex items-center gap-2"><Settings size={18} /> Settings</h2>
                          <div className="space-y-4">
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black text-pink-300 uppercase">Announcement</label><button onClick={() => handleUpdateSettings('announcement')} className="bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full text-[8px] font-black">UPDATE</button></div><textarea className="admin-input h-16 text-[11px]" value={announcement} onChange={(e) => setAnnouncement(e.target.value)} /></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black text-pink-300 uppercase">Search Guide</label><button onClick={() => handleUpdateSettings('searchGuide')} className="bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full text-[8px] font-black">UPDATE</button></div><textarea className="admin-input h-20 text-[11px]" value={searchInstruction} onChange={(e) => setSearchInstruction(e.target.value)} /></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black text-pink-300 uppercase">Background URL</label><button onClick={() => handleUpdateSettings('background')} className="bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full text-[8px] font-black">UPDATE</button></div><input type="text" className="admin-input text-[11px]" placeholder="วางลิงก์รูปภาพ..." value={bgUrl} onChange={(e) => setBgUrl(e.target.value)} /></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black text-pink-300 uppercase">Password</label><button onClick={() => handleUpdateSettings('password')} className="bg-purple-100 text-purple-500 px-2.5 py-0.5 rounded-full text-[8px] font-black">UPDATE</button></div><input type="text" className="admin-input text-[12px] font-bold text-center" value={tempPassword} onChange={(e) => setTempPassword(e.target.value)} /></div>
                          </div>
                          <button onClick={() => { setIsAdmin(false); setView('customer'); setCustomerSearch(''); }} className="w-full bg-red-50 text-red-400 py-2.5 rounded-xl font-black text-[11px] border border-red-100 uppercase">Admin Logout</button>
                       </div>
                    )}
                  </>
                )}
              </main>

              <div className="absolute bottom-5 left-1/2 -translate-x-1/2 flex items-center justify-center w-full px-5 z-40 pointer-events-none">
                {/* น้องแมว Mascot ย้ายมาอยู่ขวาล่างตรงนี้อย่างปลอดภัย */}
                <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bm1nNGd2ODNzN2J5aGZkaDh6MGMyc2p1c3dpNWJ0N3J2YzczcGFocSZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/rI2Stk88cPAhkFrN4q/giphy.gif" alt="Mascot" className="absolute bottom-[3.5rem] right-4 w-14 h-14 object-contain drop-shadow-sm" />
                
                <nav className="bg-white/95 backdrop-blur-2xl h-[3.2rem] rounded-full shadow-2xl flex items-center justify-center gap-1.5 px-2 border border-pink-50 pointer-events-auto">
                  <button onClick={() => { setView('customer'); setCustomerSearch(''); setHasSearched(false); setFoundOrders([]); }} className={`flex items-center justify-center w-9 h-9 rounded-full transition-all ${view === 'customer' ? 'text-white bg-pink-400 shadow-md scale-110' : 'text-pink-300 hover:bg-pink-50'}`}><Home size={15} fill={view === 'customer' ? 'currentColor' : 'none'} /></button>
                  <div className="w-[1px] h-4 bg-pink-100/50 mx-0.5"></div>
                  {isAdmin ? (
                    <div className="flex items-center gap-1.5">
                      <button onClick={() => setView('admin-list')} className={`flex items-center justify-center w-9 h-9 rounded-full transition-all ${view === 'admin-list' || view === 'admin-detail' ? 'text-white bg-purple-400 shadow-md scale-110' : 'text-purple-300 hover:bg-purple-50'}`}><List size={15} fill={view === 'admin-list' || view === 'admin-detail' ? 'currentColor' : 'none'} /></button>
                      <button onClick={() => { setNewOrder(initialOrderState); setView('admin-add'); }} className={`flex items-center justify-center w-9 h-9 rounded-full transition-all ${view === 'admin-add' || view === 'admin-edit' ? 'text-white bg-green-400 shadow-md scale-110' : 'text-gray-400 hover:bg-green-50'}`}><PlusCircle size={15} /></button>
                      <button onClick={() => setView('admin-settings')} className={`flex items-center justify-center w-9 h-9 rounded-full transition-all ${view === 'admin-settings' ? 'text-white bg-blue-400 shadow-md scale-110' : 'text-blue-300 hover:bg-blue-50'}`}><Settings size={15} /></button>
                    </div>
                  ) : (
                    <button onClick={() => setView('login')} className={`flex items-center justify-center w-9 h-9 rounded-full transition-all ${view === 'login' ? 'text-white bg-pink-400 shadow-md scale-110' : 'text-pink-300 hover:bg-pink-50'}`}><User size={15} fill={view === 'login' ? 'currentColor' : 'none'} /></button>
                  )}
                </nav>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
